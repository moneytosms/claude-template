# Template self-validation. TEMPLATE-ONLY — onboarding deletes this for generated projects.
# Keeps claude-template itself from shipping broken scripts/config.
name: validate-template

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax (sh -n)
        run: |
          for f in $(git ls-files '*.sh'); do echo "checking $f"; sh -n "$f"; done

      - name: PowerShell parse
        shell: pwsh
        run: |
          $bad = 0
          foreach ($f in (git ls-files '*.ps1')) {
            $e = $null
            $full = (Resolve-Path -LiteralPath $f).Path
            [void][System.Management.Automation.Language.Parser]::ParseFile($full, [ref]$null, [ref]$e)
            if ($e) { Write-Host "PARSE ERROR $f : $($e[0].Message)"; $bad = 1 } else { Write-Host "ok $f" }
          }
          exit $bad

      - name: Node module syntax (.mjs)
        run: |
          for f in $(git ls-files '*.mjs'); do echo "checking $f"; node --check "$f"; done

      - name: JSON valid
        run: |
          for f in $(git ls-files '*.json'); do
            echo "checking $f"
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done

      - name: Onboarding skill present
        run: test -f .claude/skills/project-onboarding/SKILL.md
